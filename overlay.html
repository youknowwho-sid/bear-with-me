<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bear Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; width: 1920px; height: 1080px; overflow: hidden; }

  #bear-wrap {
    position: absolute;
    bottom: -20px;
    width: 480px;
    pointer-events: none;
    user-select: none;
    transform: translateX(120%) translateY(30%);
    transition: transform 0.7s cubic-bezier(0.34, 1.3, 0.64, 1);
  }
  #bear-wrap.show { transform: translateX(0%) translateY(0%); }
  #bear-wrap.from-bottom { transform: translateX(-50%) translateY(110%); }
  #bear-wrap.from-bottom.show { transform: translateX(-50%) translateY(0%); }
  #bear-wrap.from-left { transform: translateX(-120%) translateY(30%); }
  #bear-wrap.from-left.show { transform: translateX(0%) translateY(0%); }

  #bear-img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 16px 40px rgba(0,0,0,0.6));
  }
  /* #bear-wrap.show #bear-img {
    animation: bearBob 1.2s ease-in-out infinite alternate;
  } */
  @keyframes bearBob {
    from { transform: translateY(0px) rotate(-1deg); }
    to   { transform: translateY(-14px) rotate(1deg); }
  }

  .bubble-wrap {
    position: absolute;
    top: 20px;
    left: 10px;
    opacity: 0;
    transform: scale(0.4) translateY(30px);
    transition: opacity 0.35s 0.4s, transform 0.4s 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #bear-wrap.show .bubble-wrap { opacity: 1; transform: scale(1) translateY(0); }
  .bubble {
    background: #fff; border-radius: 22px; padding: 12px 22px;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    font-size: 28px; font-weight: 700; color: #3a2008;
    white-space: nowrap; box-shadow: 0 6px 24px rgba(0,0,0,0.35); position: relative;
  }
  .bubble::after {
    content: ''; position: absolute; bottom: -13px; left: 44px;
    border: 8px solid transparent; border-top-color: #fff;
  }
</style>
</head>
<body>

<div id="bear-wrap">
  <img id="bear-img" src="https://cdn.pixabay.com/photo/2020/06/09/11/40/bear-5278071_1280.png" alt="bear" crossorigin="anonymous"/>
</div>

<script>
  const wrap = document.getElementById('bear-wrap');
  let hideTimer = null;
  let cooldown = false;

  const params = new URLSearchParams(window.location.search);
  const pos = params.get('pos') || 'right';

  if (pos === 'center') {
    wrap.style.left = '50%';
    wrap.style.right = 'auto';
    wrap.classList.add('from-bottom');
  } else if (pos === 'left') {
    wrap.style.left = '20px';
    wrap.style.right = 'auto';
    wrap.classList.add('from-left');
  } else {
    wrap.style.right = '0px';
    wrap.style.left = 'auto';
  }

  function showBear(ms = 6000) {
    if (cooldown) return;
    cooldown = true;
    if (hideTimer) clearTimeout(hideTimer);
    wrap.classList.add('show');
    hideTimer = setTimeout(() => {
      wrap.classList.remove('show');
      setTimeout(() => { cooldown = false; }, 1000);
    }, ms);
  }

  function connect() {
    const ws = new WebSocket('ws://localhost:3500');
    ws.onmessage = (e) => { if (e.data === 'BEAR_TRIGGER') showBear(); };
    ws.onclose = () => setTimeout(connect, 2000);
    ws.onerror = () => ws.close();
  }

  connect();
</script>
</body>
</html>
